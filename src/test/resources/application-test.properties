# Use H2 in test mode with a clean database each time
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable discovery APIs for tests to avoid external calls
ticketmaster.api.key=dummy_test_key
seatgeek.client.id=dummy_test_id

# Server port fixed for E2E tests
server.port=8080

# Disable CSRF for tests
spring.security.csrf.enabled=false

# Ticketmaster API Key for tests (substitui pela tua chave real)
app.discover.ticketmaster.api-key=${7ivz6QtXj2AFGwNqLEtMd6Xzg5IgQBPE:dummy_test_key}
app.discover.ticketmaster.country-code=PT

# SeatGeek (não tens chave, fica vazio)
app.discover.seatgeek.client-id=${SEATGEEK_CLIENT_ID:}